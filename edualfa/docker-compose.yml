version: '3.9'

services:
  edualfa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edualfa_app
    ports:
      - '5000:5000'
    env_file:
      - backend/.env
    volumes:
      - ./backend/dev.db:/app/dev.db
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
